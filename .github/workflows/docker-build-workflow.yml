name: Build and Push Docker image

on:
  push:
    branches:
      - master
  workflow_dispatch: # 수동으로 실행 가능하도록

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4 # 프로젝트 코드 체크아웃

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3 # Docker Hub 로그인
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker
        uses: docker/build-push-action@v5 # Docker 이미지 Build 및 Push
        with:
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/travel-planner-mcp:latest
